# settings/application-sandbox.yaml
postgres:
  host: "localhost"
  port: 5432
  database: "test_db"
  user: "test_user"
  password: "test_password"
  table_name: "Test_table"

kafka:
  bootstrap_servers: "gitlab-ci.ru:9092"
  consumer_group_id: "frap-llm-helper-group"
  input_topic: "frap-llm-helper-in"
  output_topic: "frap-llm-helper-out"

file_storage:
  output_folder: "/app/data/output"
  file_prefix: "result_"
  cleanup_after_send: false


normative_rules:
  sparkling_wine_import:
    expected_fields:
      - xml_field: "Наименование"
        normative_reference: "ГОСТ 12345-2020 п.4.1"
        severity: "error"
      - xml_field: "Производитель"
        normative_reference: "ГОСТ 12345-2020 п.4.2"
        severity: "error"
    mandatory_elements:
      - element: "Дата розлива"
        normative_requirement: "Обязательно указывается на этикетке"
      - element: "Срок годности"
        normative_requirement: "Обязательно указывается на этикетке"
      - element: "Состав"
        normative_requirement: "Обязательно указывается на этикетке"

        
logging:
  enabled: true
  table_name: "service_logs"
  batch_size: 10
  flush_interval_seconds: 5
  async_mode: true
  log_levels: ["ERROR", "WARNING", "INFO", "DEBUG"]

file_storage:
  base_path: "./test_data"  # Локальный путь для тестов
  base_output_dir: "/tmp/frap_output" # Пример для песочницы
